<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Human-in-the-Loop Needed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
        }
        .content { padding: 40px; }
        h1, h2, p { margin: 0; }
        .header {
            background-color: #1a237e;
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 28px; font-weight: bold; }
        .main-content h2 { font-size: 20px; color: #333333; margin-bottom: 15px; }
        .main-content p { font-size: 16px; line-height: 1.6; color: #555555; margin-bottom: 20px; }
        .reason-box {
            background-color: #fff;
            border: 1px dashed #cccccc;
            border-radius: 8px;
            padding: 16px;
            color: #1a237e;
            font-family: 'Courier New', Courier, monospace;
            word-break: break-word;
        }
        .meta {
            background-color: #e8eaf6;
            border-left: 4px solid #3f51b5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #333;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #888888;
            border-top: 1px solid #eeeeee;
        }
        .cta-button {
            display: inline-block;
            background-color: #3f51b5;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            margin-top: 12px;
        }
    </style>
    </head>
<body>
    <table width="100%" border="0" cellspacing="0" cellpadding="20" style="background-color: #f4f7f6;">
        <tr>
            <td align="center">
                <table class="container" border="0" cellspacing="0" cellpadding="0">
                    <tr>
                        <td class="header">
                            <h1>DocAgent</h1>
                        </td>
                    </tr>
                    <tr>
                        <td class="content">
                            <table class="main-content" width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td>
                                        <h2>👋 Human attention required</h2>
                                        <p>The agent requested your input to proceed in conversation <strong>{{conv_id}}</strong>.</p>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="meta">
                                        <div><strong>Agent</strong>: {{agent_name}}</div>
                                        <div><strong>Time</strong>: {{created_at}}</div>
                                    </td>
                                </tr>
                                <tr>
                                    <td>
                                        <p><strong>Reason:</strong></p>
                                        <div class="reason-box">{{reason}}</div>
                                    </td>
                                </tr>
                                
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td class="footer">
                            <p>&copy; 2025 DocAgent. All Rights Reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
